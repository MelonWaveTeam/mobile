<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Авасев Даниил Сергеевич, {{ myinfo[0].name }} {{ myinfo[0].surname }}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
<ion-list>
  <ion-item *ngFor="let el of mylist">
    <ion-label>{{ el }}</ion-label>
  </ion-item>
</ion-list>

<ion-grid *ngFor="let el of languages">
  <ion-row>
    <ion-col><img [src]="el.languageIcon"></ion-col> 
    <ion-col><h3>{{ el.languageName }}</h3></ion-col>
    <ion-col><p>{{ el.languageAuthor }}</p></ion-col>
    <ion-col><p>{{ el.year }}</p></ion-col>
  </ion-row>
</ion-grid>




</ion-content>
